<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 ProzorroHunter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        
        .header {
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            padding: 20px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #6366f1;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
        }
        
        .btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.5);
        }
        
        .btn-small {
            padding: 8px 16px;
            font-size: 0.875rem;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .filters-section {
            margin-bottom: 30px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .filter-card {
            padding: 20px;
            position: relative;
        }
        
        .filter-card h3 {
            margin-bottom: 10px;
            padding-right: 30px;
        }
        
        .filter-delete {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s;
        }
        
        .filter-delete:hover {
            background: rgba(239, 68, 68, 0.4);
            transform: scale(1.1);
        }
        
        .filter-tag {
            display: inline-block;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            font-size: 0.85rem;
            margin: 5px 5px 5px 0;
        }
        
        .filter-actions {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .search-section {
            margin-bottom: 30px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            padding: 20px;
        }
        
        .search-box input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1rem;
        }
        
        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .table-container {
            padding: 20px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        th {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }
        
        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: rgba(26, 26, 46, 0.95);
            padding: 30px;
            border-radius: 16px;
            max-width: 600px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .confirm-modal {
            max-width: 400px;
            text-align: center;
        }
        
        .confirm-modal h2 {
            margin-bottom: 15px;
            color: #ef4444;
        }
        
        .confirm-modal p {
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1rem;
        }
        
        .form-group select option {
            background: #1a1a2e;
            color: white;
        }
        
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .amount { color: #10b981; font-weight: bold; }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: rgba(16, 185, 129, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }
        
        .notification.error {
            background: rgba(239, 68, 68, 0.9);
        }
        
        .notification.info {
            background: rgba(59, 130, 246, 0.9);
        }
        
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header glass">
            <h1>🎯 ProzorroHunter</h1>
            <p>Автоматичний моніторинг тендерів Prozorro 24/7</p>
        </div>
        
        <div class="stats">
            <div class="stat-card glass">
                <div class="stat-value" id="totalTenders">0</div>
                <div class="stat-label">Всього тендерів</div>
            </div>
            <div class="stat-card glass">
                <div class="stat-value" id="todayTenders">0</div>
                <div class="stat-label">Сьогодні</div>
            </div>
            <div class="stat-card glass">
                <div class="stat-value" id="activeFilters">0</div>
                <div class="stat-label">Активних фільтрів</div>
            </div>
        </div>
        
        <div class="search-section">
            <div class="search-box glass">
                <input 
                    type="text" 
                    id="tenderIdSearch" 
                    placeholder="🔍 Введіть номер тендера (наприклад: UA-2024-01-01-000001-a)"
                />
                <button class="btn btn-success" onclick="searchByTenderId()">
                    Знайти тендер
                </button>
            </div>
        </div>
        
        <div class="filters-section">
            <div class="section-header">
                <h2>📋 Мої Фільтри</h2>
                <button class="btn" onclick="openModal()">➕ Створити фільтр</button>
            </div>
            <div class="filters-grid" id="filtersGrid"></div>
        </div>
        
        <div class="table-container glass">
            <h2 style="margin-bottom: 20px;">📊 Знайдені Тендери</h2>
            <table>
                <thead>
                    <tr>
                        <th>Номер</th>
                        <th>Назва</th>
                        <th>Замовник</th>
                        <th>Сума</th>
                        <th>Регіон</th>
                        <th>Дата</th>
                        <th>Дії</th>
                    </tr>
                </thead>
                <tbody id="tendersTable"></tbody>
            </table>
        </div>
    </div>
    
    <!-- Create Filter Modal -->
    <div class="modal" id="filterModal">
        <div class="modal-content glass">
            <h2>Створити новий фільтр</h2>
            <form id="filterForm">
                <div class="form-group">
                    <label>Назва фільтра *</label>
                    <input type="text" id="filterName" required placeholder="Комп'ютерна техніка">
                </div>
                
                <div class="form-group">
                    <label>Ключові слова</label>
                    <input type="text" id="filterKeywords" placeholder="ноутбук, комп'ютер, принтер">
                </div>
                
                <div class="form-group">
                    <label>CPV код</label>
                    <input type="text" id="filterCpv" placeholder="30200000-1">
                </div>
                
                <div class="form-group">
                    <label>Регіон</label>
                    <select id="filterRegion">
                        <option value="">Будь-який регіон</option>
                        <optgroup label="Області">
                            <option value="Вінницька область">Вінницька область</option>
                            <option value="Волинська область">Волинська область</option>
                            <option value="Дніпропетровська область">Дніпропетровська область</option>
                            <option value="Донецька область">Донецька область</option>
                            <option value="Житомирська область">Житомирська область</option>
                            <option value="Закарпатська область">Закарпатська область</option>
                            <option value="Запорізька область">Запорізька область</option>
                            <option value="Івано-Франківська область">Івано-Франківська область</option>
                            <option value="Київська область">Київська область</option>
                            <option value="Кіровоградська область">Кіровоградська область</option>
                            <option value="Луганська область">Луганська область</option>
                            <option value="Львівська область">Львівська область</option>
                            <option value="Миколаївська область">Миколаївська область</option>
                            <option value="Одеська область">Одеська область</option>
                            <option value="Полтавська область">Полтавська область</option>
                            <option value="Рівненська область">Рівненська область</option>
                            <option value="Сумська область">Сумська область</option>
                            <option value="Тернопільська область">Тернопільська область</option>
                            <option value="Харківська область">Харківська область</option>
                            <option value="Херсонська область">Херсонська область</option>
                            <option value="Хмельницька область">Хмельницька область</option>
                            <option value="Черкаська область">Черкаська область</option>
                            <option value="Чернівецька область">Чернівецька область</option>
                            <option value="Чернігівська область">Чернігівська область</option>
                        </optgroup>
                        <optgroup label="Міста">
                            <option value="Київ">Київ</option>
                            <option value="Харків">Харків</option>
                            <option value="Одеса">Одеса</option>
                            <option value="Дніпро">Дніпро</option>
                            <option value="Донецьк">Донецьк</option>
                            <option value="Запоріжжя">Запоріжжя</option>
                            <option value="Львів">Львів</option>
                            <option value="Кривий Ріг">Кривий Ріг</option>
                        </optgroup>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Замовник/Покупець</label>
                    <input type="text" id="filterProcuringEntity" placeholder="Назва організації-замовника">
                </div>
                
                <div class="form-group">
                    <label>Виконавець/Продавець</label>
                    <input type="text" id="filterSupplier" placeholder="Назва організації-виконавця">
                </div>
                
                <div class="form-group">
                    <label>Період пошуку</label>
                    <select id="filterPeriod">
                        <option value="7">Тиждень (7 днів)</option>
                        <option value="30" selected>Місяць (30 днів)</option>
                        <option value="90">Квартал (90 днів)</option>
                        <option value="180">Пів року (180 днів)</option>
                        <option value="365">Рік (365 днів)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Мін. сума (грн)</label>
                    <input type="number" id="filterMinAmount" placeholder="50000">
                </div>
                
                <div class="form-group">
                    <label>Макс. сума (грн)</label>
                    <input type="number" id="filterMaxAmount" placeholder="500000">
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Скасувати</button>
                    <button type="submit" class="btn">✨ Створити</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Confirm Delete Modal -->
    <div class="modal" id="confirmModal">
        <div class="modal-content glass confirm-modal">
            <h2>⚠️ Видалити фільтр?</h2>
            <p id="confirmText">Ви впевнені що хочете видалити цей фільтр?</p>
            <div class="form-actions" style="justify-content: center;">
                <button class="btn-secondary" onclick="closeConfirm()">Скасувати</button>
                <button class="btn btn-danger" onclick="confirmDelete()">Видалити</button>
            </div>
        </div>
    </div>
    
    <script>
        let deleteFilterId = null;
        
        async function loadData() {
            await loadStats();
            await loadFilters();
            await loadTenders();
        }
        
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('totalTenders').textContent = data.total;
                document.getElementById('todayTenders').textContent = data.today;
                document.getElementById('activeFilters').textContent = data.active;
            } catch (e) {
                console.error('Помилка завантаження статистики:', e);
            }
        }
        
        async function loadFilters() {
            try {
                const res = await fetch('/api/filters');
                const filters = await res.json();
                const grid = document.getElementById('filtersGrid');
                
                if (filters.length === 0) {
                    grid.innerHTML = '<p style="color: rgba(255,255,255,0.5); padding: 40px; text-align: center; grid-column: 1/-1;">Фільтрів ще немає. Створіть перший фільтр!</p>';
                    return;
                }
                
                grid.innerHTML = filters.map(f => `
                    <div class="filter-card glass">
                        <div class="filter-delete" onclick="askDeleteFilter(${f.id}, '${f.name}')" title="Видалити фільтр">×</div>
                        <h3>${f.name}</h3>
                        ${f.keywords ? `<div class="filter-tag">🔑 ${f.keywords}</div>` : ''}
                        ${f.cpv ? `<div class="filter-tag">📦 CPV: ${f.cpv}</div>` : ''}
                        ${f.region ? `<div class="filter-tag">📍 ${f.region}</div>` : ''}
                        ${f.procuringEntity ? `<div class="filter-tag">🏢 Замовник: ${f.procuringEntity}</div>` : ''}
                        ${f.supplier ? `<div class="filter-tag">👤 Виконавець: ${f.supplier}</div>` : ''}
                        ${f.minAmount || f.maxAmount ? `<div class="filter-tag">💰 ${f.minAmount || '0'} - ${f.maxAmount || '∞'} грн</div>` : ''}
                        ${f.periodDays ? `<div class="filter-tag">📅 ${f.periodDays} днів</div>` : ''}
                        <div style="margin-top: 10px;">
                            <span class="filter-tag">Знайдено: ${f.foundCount || 0}</span>
                        </div>
                        <div class="filter-actions">
                            <button class="btn btn-small btn-success" onclick="searchNow(${f.id})">
                                🔍 Шукати зараз
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Помилка завантаження фільтрів:', e);
            }
        }
        
        async function loadTenders() {
            try {
                const res = await fetch('/api/tenders');
                const tenders = await res.json();
                const table = document.getElementById('tendersTable');
                
                if (tenders.length === 0) {
                    table.innerHTML = `
                        <tr>
                            <td colspan="7" style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">
                                Тендерів ще не знайдено. Натисніть "🔍 Шукати зараз" на фільтрі або створіть новий фільтр.
                            </td>
                        </tr>
                    `;
                    return;
                }
                
                table.innerHTML = tenders.map(t => `
                    <tr>
                        <td><small style="color: rgba(255,255,255,0.5);">${t.id}</small></td>
                        <td>
                            <div>${t.title}</div>
                            ${t.cpv ? `<small style="color: rgba(255,255,255,0.5);">CPV: ${t.cpv}</small>` : ''}
                        </td>
                        <td>${t.procuringEntity}</td>
                        <td class="amount">${formatAmount(t.amount)}</td>
                        <td>${t.region || '-'}</td>
                        <td>${formatDate(t.datePublished)}</td>
                        <td><a href="${t.url}" target="_blank" style="color: #6366f1;">Відкрити →</a></td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error('Помилка завантаження тендерів:', e);
            }
        }
        
        async function searchByTenderId() {
            const tenderId = document.getElementById('tenderIdSearch').value.trim();
            
            if (!tenderId) {
                showNotification('Введіть номер тендера', 'error');
                return;
            }
            
            showNotification('🔍 Шукаю тендер...', 'info');
            
            try {
                const response = await fetch(`/api/tender/${tenderId}`);
                const data = await response.json();
                
                console.log('Відповідь від API:', data);
                
                // Перевіряємо чи є помилка
                if (data.error) {
                    showNotification('❌ Тендер не знайдено. Перевірте номер.', 'error');
                    return;
                }
                
                // Якщо тендер знайдено - відкриваємо
                if (data.url) {
                    window.open(data.url, '_blank');
                    showNotification('✅ Тендер знайдено! Відкрито в новій вкладці');
                } else {
                    showNotification('❌ Тендер не знайдено', 'error');
                }
                
            } catch (e) {
                showNotification('❌ Помилка пошуку', 'error');
                console.error('Помилка:', e);
            }
        }
        
        async function searchNow(filterId) {
            showNotification('🔍 Запускаю пошук...', 'info');
            
            try {
                await fetch(`/api/filters/${filterId}/search`, { method: 'POST' });
                showNotification('✅ Пошук запущено! Оновлюю дані через 5 сек...');
                setTimeout(() => loadData(), 5000);
            } catch (e) {
                showNotification('⏳ Пошук запущено в фоні. Оновіть сторінку через хвилину.', 'info');
            }
        }
        
        function askDeleteFilter(id, name) {
            deleteFilterId = id;
            document.getElementById('confirmText').textContent = `Видалити фільтр "${name}"?`;
            document.getElementById('confirmModal').classList.add('active');
        }
        
        async function confirmDelete() {
            if (!deleteFilterId) return;
            
            try {
                await fetch(`/api/filters/${deleteFilterId}`, { method: 'DELETE' });
                showNotification('✅ Фільтр видалено');
                closeConfirm();
                loadData();
            } catch (e) {
                showNotification('❌ Помилка видалення', 'error');
            }
        }
        
        function closeConfirm() {
            document.getElementById('confirmModal').classList.remove('active');
            deleteFilterId = null;
        }
        
        function formatAmount(amount) {
            return new Intl.NumberFormat('uk-UA', { 
                style: 'currency', 
                currency: 'UAH',
                minimumFractionDigits: 0 
            }).format(amount);
        }
        
        function formatDate(dateString) {
            return new Date(dateString).toLocaleString('uk-UA', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function openModal() {
            document.getElementById('filterModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('filterModal').classList.remove('active');
            document.getElementById('filterForm').reset();
        }
        
        document.getElementById('filterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const filter = {
                name: document.getElementById('filterName').value,
                keywords: document.getElementById('filterKeywords').value || null,
                cpv: document.getElementById('filterCpv').value || null,
                region: document.getElementById('filterRegion').value || null,
                procuringEntity: document.getElementById('filterProcuringEntity').value || null,
                supplier: document.getElementById('filterSupplier').value || null,
                minAmount: parseFloat(document.getElementById('filterMinAmount').value) || null,
                maxAmount: parseFloat(document.getElementById('filterMaxAmount').value) || null,
                periodDays: parseInt(document.getElementById('filterPeriod').value) || 30
            };
            
            try {
                const res = await fetch('/api/filters', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(filter)
                });
                
                if (res.ok) {
                    showNotification('✅ Фільтр створено! Пошук запущено...');
                    closeModal();
                    setTimeout(() => loadData(), 3000);
                }
            } catch (e) {
                showNotification('❌ Помилка створення фільтра', 'error');
            }
        });
        
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
        
        setInterval(loadData, 30000);
        loadData();
    </script>
</body>
</html>
