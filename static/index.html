<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Поиск тендера</title>
<style>
body { font-family: Arial; padding: 20px; }
input { padding: 10px; width: 300px; }
button { padding: 10px; }
#result { margin-top: 20px; }
</style>
</head>
<body>

<h2>Поиск тендера Prozorro</h2>

<input id="tenderId" placeholder="UA-XXXX-XX-XX-XXXXXX-X">
<button onclick="searchTender()">Поиск</button>

<div id="result"></div>

<script>
async function searchTender() {
    const id = document.getElementById('tenderId').value;

    const res = await fetch(`/search?id=${id}`);
    const data = await res.json();

    const resultDiv = document.getElementById('result');

    if (data.error) {
        resultDiv.innerHTML = "Ошибка: " + data.error;
        return;
    }

    resultDiv.innerHTML = `
        <h3>${data.data.title}</h3>
        <p>${data.data.description || ''}</p>
        <a href="https://prozorro.gov.ua/tender/${id}" target="_blank">Открыть в Prozorro</a>
    `;
}
</script>

</body>
</html>
