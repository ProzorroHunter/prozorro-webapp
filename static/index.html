<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 ProzorroHunter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        .header {
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        /* ── Stats ── */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card { padding: 20px; text-align: center; }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #6366f1;
        }
        .stat-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
        }
        /* ── Buttons ── */
        .btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.5);
        }
        .btn-small { padding: 8px 16px; font-size: 0.875rem; }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .btn-warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); }
        /* ── Search ── */
        .search-section { margin-bottom: 30px; }
        .search-box {
            display: flex;
            gap: 10px;
            padding: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1rem;
        }
        .search-box input::placeholder { color: rgba(255, 255, 255, 0.5); }
        /* решта стилів без змін (я їх не чіпав) */
        .notification { position: fixed; top: 20px; right: 20px; padding: 14px 22px; background: rgba(16, 185, 129, 0.9); backdrop-filter: blur(10px); border-radius: 8px; color: white; font-weight: 500; z-index: 2000; animation: slideIn 0.3s ease; max-width: 320px; }
        .notification.error { background: rgba(239, 68, 68, 0.9); }
        .notification.info { background: rgba(59, 130, 246, 0.9); }
        .notification.warning { background: rgba(245, 158, 11, 0.9); }
        @keyframes slideIn { from { transform: translateX(360px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        /* Tender modal improvements */
        .fresh-tender-banner {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.4);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 20px;
            color: #fbbf24;
            font-size: 0.95rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<script>
// ─── Search by tender ID ───────────────────────────────
async function searchByTenderId() {
    const tenderId = document.getElementById('tenderIdSearch').value.trim();
    if (!tenderId) {
        showNotification('Введіть номер тендера', 'error');
        return;
    }
    showNotification('🔍 Шукаю тендер... (може зайняти кілька секунд)', 'info');

    try {
        const res = await fetch(`/api/tender/${encodeURIComponent(tenderId)}`);
        const data = await res.json();

        // 🔥 Головний фікс: тепер показуємо модалку навіть для newTender
        showTenderModal(data);

    } catch (e) {
        showNotification('🔗 Відкриваємо тендер на Prozorro.gov.ua...', 'info');
        window.open(`https://prozorro.gov.ua/tender/${encodeURIComponent(tenderId)}`, '_blank');
        console.error(e);
    }
}

// ─── Show Tender Modal (оновлена) ─────────────────────
function showTenderModal(data) {
    document.getElementById('tenderModalId').textContent = data.id;
    document.getElementById('tenderModalTitle').textContent = data.title || 'Тендер завантажується...';
    document.getElementById('tenderModalLink').href = data.url;

    const grid = document.getElementById('tenderInfoGrid');
    let extraHTML = '';

    // ── Банер для свіжих тендерів (саме те, що тобі треба) ──
    if (data.newTender) {
        extraHTML = `
        <div class="fresh-tender-banner">
            <strong>🟠 Тендер дуже свіжий!</strong><br>
            ${data.apiMessage || 'Дані ще індексуються в API Prozorro. Натисни кнопку нижче — перейдеш одразу на офіційний сайт.'}
        </div>`;
    }

    // решта модалки (статус, замовник, сума тощо) — залишається
    const statusMap = { /* ... той самий statusMap ... */ };
    const [statusLabel, statusClass] = statusMap[data.status] || ['❓ Невідомо', 'status-unknown'];

    grid.innerHTML = `
        ${extraHTML}
        <div class="tender-info-item" style="grid-column:1/-1;">
            <div class="tender-info-label">Статус</div>
            <span class="status-badge ${statusClass}">${statusLabel}</span>
        </div>
        <div class="tender-info-item" style="grid-column:1/-1;">
            <div class="tender-info-label">Замовник</div>
            <div class="tender-info-value">${escHtml(data.procuringEntity || '—')}</div>
        </div>
        <div class="tender-info-item">
            <div class="tender-info-label">Сума</div>
            <div class="tender-amount-value">${data.amount ? formatAmount(data.amount) : '—'}</div>
        </div>
        <div class="tender-info-item">
            <div class="tender-info-label">Регіон</div>
            <div class="tender-info-value">${escHtml([data.region, data.locality].filter(Boolean).join(', ') || '—')}</div>
        </div>
        ${data.cpv ? `<div class="tender-info-item"><div class="tender-info-label">CPV код</div><div class="tender-info-value" style="font-family:monospace;">${escHtml(data.cpv)}</div></div>` : ''}
        ${data.cpvDescription ? `<div class="tender-info-item"><div class="tender-info-label">Категорія</div><div class="tender-info-value">${escHtml(data.cpvDescription)}</div></div>` : ''}
        ${data.datePublished ? `<div class="tender-info-item"><div class="tender-info-label">Дата публікації</div><div class="tender-info-value">${formatDate(data.datePublished)}</div></div>` : ''}
    `;

    document.getElementById('tenderModal').classList.add('active');
}

</script>
</body>
</html>
